<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="header">
        <div>
          <h1>4-Camera Monitor Wall</h1>
          <p>
            This dashboard embeds four MediaMTX WebRTC viewers and displays
            `cam1` through `cam4` simultaneously in a 2x2 layout.
          </p>
        </div>
        <div class="pill mono" id="serverStatus">Loading...</div>
      </section>

      <section class="panel stack">
        <div class="controls">
          <button class="button" id="compileRecordingsButton" type="button">
            Compile All Cameras
          </button>
          <div class="pill mono" id="compileStatus">Idle</div>
        </div>
        <div class="controls">
          <label class="input-group" for="kiriApiKey">
            <span class="input-label">KIRI API Key</span>
            <input
              class="text-input mono"
              id="kiriApiKey"
              type="password"
              placeholder="Paste KIRI API key"
              autocomplete="off"
            />
          </label>
        </div>
        <div class="stack" id="compileResults" hidden></div>
      </section>

      <section class="panel stack">
        <div class="controls">
          <strong>KIRI Results</strong>
          <div class="pill mono" id="kiriResultsStatus">No tracked jobs</div>
        </div>
        <div class="stack" id="kiriJobsList"></div>
      </section>

      <section class="panel stack">
        <div class="controls">
          <strong>Lambda Splat Pipeline</strong>
          <div class="pill mono" id="splatStatus">Idle</div>
        </div>
        <div class="controls">
          <button class="button" id="startSplatButton" type="button">
            Generate Splat (latest compiled)
          </button>
          <label class="input-group" for="splatMaxSteps">
            <span class="input-label">Max steps</span>
            <input class="text-input mono" id="splatMaxSteps" type="number" value="7000" min="1000" max="30000" step="500" />
          </label>
          <label class="input-group" for="splatFramesPerCam">
            <span class="input-label">Frames / cam</span>
            <input class="text-input mono" id="splatFramesPerCam" type="number" value="120" min="20" max="400" step="10" />
          </label>
          <label class="input-group" for="splatKeepWarm" style="flex-direction:row;align-items:center;gap:6px">
            <input id="splatKeepWarm" type="checkbox" />
            <span class="input-label">Keep instance warm</span>
          </label>
        </div>
        <div class="stack" id="splatJobsList"></div>
      </section>

      <section class="grid" id="videoGrid"></section>
    </main>

    <script src="/mediamtx/cam1/reader.js"></script>
    <script src="/viewer.js"></script>
  </body>
</html>
